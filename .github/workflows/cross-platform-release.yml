name: Cross-platform release gate

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  released-surfaces:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium
      - if: runner.os != 'Linux'
        run: npx playwright install chromium
      - run: npm run release:cross-platform:full
