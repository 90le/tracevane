<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Tracevane mark</title>
  <desc id="desc">A compass-vane arrow following a traced signal path inside an Aurora teal rounded square.</desc>
  <defs>
    <linearGradient id="tv-bg" x1="8" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2FFF9"/>
      <stop offset="0.44" stop-color="#BFEFE3"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="tv-vane" x1="18" y1="44" x2="47" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B2F33"/>
      <stop offset="0.48" stop-color="#155E75"/>
      <stop offset="1" stop-color="#2A9D8F"/>
    </linearGradient>
    <linearGradient id="tv-trace" x1="12" y1="47" x2="50" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD6A5"/>
      <stop offset="1" stop-color="#7FFFD4"/>
    </linearGradient>
    <filter id="tv-soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#064E3B" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#tv-bg)"/>
  <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="15.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="1.5"/>
  <path d="M14 43.5C20.5 35 28.7 31.1 41.8 30.2" fill="none" stroke="url(#tv-trace)" stroke-width="5.2" stroke-linecap="round"/>
  <path d="M14 43.5C20.5 35 28.7 31.1 41.8 30.2" fill="none" stroke="#0B2F33" stroke-opacity="0.22" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="14" cy="43.5" r="3.4" fill="#0B2F33"/>
  <circle cx="28.4" cy="33.8" r="2.1" fill="#FFFFFF" fill-opacity="0.88"/>
  <circle cx="41.8" cy="30.2" r="2.6" fill="#FFD6A5"/>
  <g filter="url(#tv-soft)">
    <path d="M49.5 13.5L40.8 46.8L32.4 34.6L19.2 30.1L49.5 13.5Z" fill="url(#tv-vane)"/>
    <path d="M49.5 13.5L32.4 34.6L40.8 46.8L49.5 13.5Z" fill="#7FFFD4" fill-opacity="0.22"/>
    <path d="M49.5 13.5L40.8 46.8L32.4 34.6L19.2 30.1L49.5 13.5Z" fill="none" stroke="#F2FFF9" stroke-opacity="0.78" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <path d="M25.4 27.4L35.7 30.9" stroke="#F2FFF9" stroke-opacity="0.78" stroke-width="1.6" stroke-linecap="round"/>
</svg>
