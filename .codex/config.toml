# Tracevane project-local Codex configuration.
# Loaded only when this trusted project is active. Keep this file small and use
# AGENTS.md / .codex/project-context.md for behavioral guidance.

# Root AGENTS.md plus nested AGENTS files are intentionally detailed for this
# repo. Raise the default instruction budget so Codex does not truncate the
# IDE/editor guardrails.
project_doc_max_bytes = 65536

[agents]
# Keep project subagent fan-out predictable. Direct children are enough for
# explore / verify sidecar work; recursive delegation should be explicitly
# requested rather than enabled by default.
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

# Public OpenAI/Codex documentation lookup. Useful for Codex CLI, AGENTS, skills, MCP, hooks, and OpenAI API questions.
# Keep non-required so local work is not blocked if the docs server is unavailable.
[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
enabled = true
required = false
tool_timeout_sec = 60
default_tools_approval_mode = "approve"
