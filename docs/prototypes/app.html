<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tracevane Aurora</title>
  <link rel="stylesheet" href="app/styles.css" />
</head>
<body data-theme="light" data-palette="blue">
  <div class="aurora"></div>
  <div class="app" id="app" data-nav="expanded" data-mobile="closed">
    <div class="scrim" id="scrim"></div>
    <aside class="sidebar">
      <div class="brand"><div class="logo">TV</div><div class="brand-copy"><strong>Tracevane</strong><span>本地 AI Agent 工作台</span></div></div>
      <button class="cmd-trigger" id="cmdTrigger"><i data-lucide="search"></i><span>搜索页面或命令</span><span class="kbd">⌘K</span></button>
      <nav class="nav" id="nav" aria-label="主导航"></nav>
      <div class="nav-foot">
        <button class="btn-icon btn-ghost" id="collapseBtn" title="折叠导航"><i data-lucide="panel-left-close"></i></button>
        <button class="btn-icon btn-ghost" id="themeBtn" title="切换深浅主题"><i data-lucide="sun-moon"></i></button>
        <button class="btn-icon btn-ghost" id="settingsBtn" title="视图设置" data-toast="视图设置（占位）" data-toast-tone="info"><i data-lucide="settings-2"></i></button>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="top-left">
          <button class="btn-icon btn-ghost mobile-menu" id="menuBtn" aria-label="打开导航"><i data-lucide="menu"></i></button>
          <div class="crumb"><span id="crumbPath">总览 / 仪表盘</span><strong id="crumbTitle">仪表盘</strong></div>
        </div>
        <div class="top-actions">
          <button class="top-search" id="topSearch"><i data-lucide="search"></i><span>搜索</span><span class="kbd">⌘K</span></button>
          <button class="btn-primary" data-route="chat" style="text-decoration:none"><i data-lucide="plus"></i><span>新建会话</span></button>
        </div>
      </header>
      <section class="page"><div class="wrap" id="stage"></div></section>
    </main>
  </div>

  <!-- overlays：全应用唯一一套 -->
  <div class="mask" id="sheetMask"></div>
  <aside class="sheet" id="sheet" aria-label="详情">
    <div class="sheet-head"><div class="htitle"><strong id="shTitle">详情</strong><span id="shSub">来源</span></div><button class="btn-icon btn-ghost" id="shClose" aria-label="关闭"><i data-lucide="x"></i></button></div>
    <div class="sheet-body"><p class="sheet-note" id="shNote"></p><dl class="kv"><dt>状态</dt><dd id="shStatus">-</dd><dt>来源</dt><dd id="shOwner">-</dd><dt>建议动作</dt><dd id="shAction">-</dd></dl><div id="shExtra"></div><div class="logbox" id="shLog">waiting...</div></div>
    <div class="sheet-foot"><button class="btn-ghost" id="shCancel">关闭</button><button class="btn-primary" id="shGo"><i data-lucide="arrow-right"></i><span>执行建议动作</span></button></div>
  </aside>
  <div class="dlg-mask" id="dlgMask"><div class="dlg" role="dialog" aria-label="确认"><div class="dlg-head info" id="dlgHead"><span class="di"><i data-lucide="shield-alert" id="dlgIcon"></i></span><strong id="dlgTitle">确认操作</strong></div><div class="dlg-body" id="dlgBody"></div><div class="dlg-foot"><button class="btn-ghost" id="dlgCancel">取消</button><button class="btn-primary" id="dlgOk"><span>确认</span></button></div></div></div>
  <div class="cmd-mask" id="cmdMask"><div class="cmd" role="dialog" aria-label="命令面板"><div class="cmd-input"><i data-lucide="search"></i><input id="cmdInput" placeholder="搜索页面或命令…" /><span class="kbd">esc</span></div><div class="cmd-list" id="cmdList"></div></div></div>
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="app/states.js"></script>
  <script src="app/router.js"></script>
  <script src="app/pages.js"></script>
  <!-- 页面专属 data + mount 脚本（可选，按需） -->
  <script src="data/pages-data.js"></script>
  <script src="app/shell.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      AuroraShellInit();
      // 路由里 <a href="#/xxx"> 自然走 hashchange；顶部新建会话也走路由
      document.querySelector('.top-actions [data-route]')?.addEventListener('click', () => { location.hash = '#/chat'; });
    });
  </script>
</body>
</html>
